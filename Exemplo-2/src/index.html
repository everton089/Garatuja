<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='main.css'>
    <script src='main.js'></script>
</head>
<body>
    <div>
        <input name="item">
        <button id="action">add</button>
    </div>
    <ul>

    </ul>
    <template>
        <li>
            <span>item</span>
            <div>
                <button id="delete">delete</button>
                <button id="edit">edit</button>
            </div>
        </li>
    </template>
    <script>
        const btAdd = document.querySelector("#action")
        const imput = document.querySelector("[name='item']")
        const list = document.querySelector("ul")
        const templateLi = document.querySelector("template")

        btAdd.addEventListener("click", ()=> {
            const newItem = templateLi.content.querySelector("li").cloneNode(true)
            newItem.querySelector("span").textContent = imput.value

            newItem.querySelector("#delete").addEventListener("click","press = ", () => newItem.remove())

            list.prepend(newItem)
            imput.value =""
        })
    </script>
</body>
</html>
